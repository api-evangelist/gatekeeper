aid: gatekeeper
name: Gatekeeper
description: >-
  Gatekeeper is a SaaS contract lifecycle management (CLM) and vendor
  management platform that helps procurement, legal, and finance teams capture,
  approve, store, and renew supplier contracts with workflow automation,
  e-signature, spend analytics, and risk monitoring. The Gatekeeper REST API
  exposes vendors, contracts, employees, custom data records, files,
  workflows, and events so customers can integrate Gatekeeper with ERP, HRIS,
  and finance systems. API access is per-tenant and authenticated with a
  tenant-specific API key.
